events {
    worker_connections 1024;
}

http {
    upstream pqr_swarm {
        server pqr-server:8196;
    }

    server {
        listen 80;
        server_name localhost pqr.info;

        # Docker internal DNS resolver
        resolver 127.0.0.11 valid=30s;
        set $upstream_endpoint http://pqr-server:8196;

        location / {
            proxy_pass $upstream_endpoint;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;

            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }
    }

    server {
        listen 443 ssl default_server;
        server_name pqr.info;

        ssl_certificate /etc/nginx/certs/origin_ca.pem;
        ssl_certificate_key /etc/nginx/certs/origin_ca.key;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Static HUD Assets
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /web/ {
            alias /usr/share/nginx/html/;
        }

        # API Proxy (Plain HTTP to Backend)
        location /REST/2.0/ {
            proxy_pass http://pqr-server:8196/REST/2.0/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Disable caching for API
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            proxy_read_timeout 300s;
        }
    }
}
