services:
  db:
    image: cockroachdb/cockroach:v23.1.13
    command: start --insecure --advertise-addr=${NODE_IP:-db} --join=${JOIN_IPS:-db} --http-addr=0.0.0.0
    ports:
      - "5196:26257"   # IBP DB Port
      - "8081:8080"    # DB Console
    volumes:
      - cockroach_data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 10s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.13.3
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=pqr-vault-token
      - VAULT_ADDR=http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK

  pqr-server:
    build: .
    deploy:
      replicas: 3
    environment:
      - DATABASE_URL=postgresql://root@db:26257/antigravity?sslmode=disable
      - PORT=8196
      - VAULT_ADDR=http://vault:8200
      - VAULT_TOKEN=pqr-vault-token
      - GEMINI_API_KEY=AIzaSyCqMMdPm1s6MuXy06yiWUlIQ0CJ1C-rPWk
      - CF_ACCESS_CLIENT_ID=c98ca7026f54305b05cd24975a3ce6d2.access
      - CF_ACCESS_CLIENT_SECRET=ebf3177d992adb0c3db7b088fb5b9e3d83e96649fb9bc5b86a25301af5c8e744
    volumes:
      - ./certs:/app/certs
      - ./signals:/app/signals
    depends_on:
      - db
      - vault

  gateway:
    image: nginx:alpine
    ports:
      - "3196:80"    # Balanced PQR UI & API Port
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - pqr-server

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token eyJhIjoiYzA3Y2NjYTM3ZDMyN2Y3Nzk5NjcxZDIzMDhmODBiZWIiLCJ0IjoiNzUzMDQ5NzAtMWZhMC00Y2Q0LTg1M2QtOGUzZGQyM2NjOGU0IiwicyI6IlpqTTFNRFkzTUdZdE9ESTFZaTAwT1RNM0xXRmtORFl0Wm1Fd01UQXdOR1l3T1dVeiJ9
    restart: always
    depends_on:
      - gateway

volumes:
  cockroach_data:
